<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Flappy bird ahh</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flappy Duo</title>
</head>
<body>

<div id="game">

  <div id="score">0</div>
  <div id="tap-text">Press W or L to Start</div>
  <div id="popup"></div>

  <!-- Pipes -->
  <div class="pipe pipe-top"></div>
  <div class="pipe pipe-bottom"></div>

  <!-- Bird 1 -->
  <div id="bird1" class="bird yellow">
    <div class="wing"></div>
    <div class="eye"></div>
    <div class="pupil"></div>
    <div class="beak"></div>
  </div>

  <!-- Bird 2 -->
  <div id="bird2" class="bird blue">
    <div class="wing"></div>
    <div class="eye"></div>
    <div class="pupil"></div>
    <div class="beak"></div>
  </div>

  <!-- Game Over -->
  <div id="game-over-menu">
    <h1>Game Over</h1>
    <p id="final-score">Score: 0</p>
    <button id="restart-btn">Restart</button>
  </div>

</div>

</body>
</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
